<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items Toevoegen</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <!-- icon is made by chatgpt, prompt: hey, can you generate an image for me, an icon for a "slotrace collection tracker", like a favicon, don't make it too detailed -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/add.css">
    <script src="JavaScript/add.js" type="module"></script>
</head>

<body>
    <header>
        <div class="wrapper">
            <img src="img/logo.png" alt="Slotcar Collection Tracker">
            <nav>
                <ul>
                    <li><a href="index.html">Mijn Collectie</a></li>
                    <li class="active"><a href="add.html">Items Toevoegen</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h1>Items Toevoegen</h1>
        <div>
            <form>
                <label for="maker">Maker:</label>
                <input type="text" name="maker" id="maker">
                <label for="car-class">Klasse:</label>
                <input type="text" name="car-class" id="car-class">
                <label for="brand">Merk:</label>
                <input type="text" name="brand" id="brand">
                <label for="scale">Schaal:</label>
                <input type="text" name="scale" id="scale">
                <label for="color">Kleur:</label>
                <input type="text" name="color" id="color">
                <label for="price">prijs:</label>
                <input type="number" name="price" id="price">
                <label for="state">Staat:</label>
                <select name="state" id="state">
                    <option value="new">Nieuw</option>
                    <option value="used">Gebruikt</option>
                    <option value="damaged">Beschadigd</option>
                </select>
                <input type="submit" value="Toevoegen aan collectie">
                <div id="message">
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Slotcar Collection Tracker</p>
            <p>Built for collectors</p>
        </div>
    </footer>
</body>

</html>
