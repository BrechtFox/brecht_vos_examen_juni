<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collectie</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <!-- icon is made by chatgpt, prompt: hey, can you generate an image for me, an icon for a "slotrace collection tracker", like a favicon, don't make it too detailed -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/collection.css">
    <script src="JavaScript/script.js" type="module"></script>
</head>

<body>
    <header>
        <div class="wrapper">
            <img src="img/logo.png" alt="Slotcar Collection Tracker">
            <nav>
                <ul>
                    <li class="active"><a href="index.html">Mijn Collectie</a></li>
                    <li><a href="add.html">Items Toevoegen</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <form class="sort">
        <legend>Sorteer</legend>
        <Label>
            <input type="radio" name="sort" value="price-asc" checked>
            Prijs (laag -> hoog)
        </Label>
        <br>
        <label>
            <input type="radio" name="sort" value="price-desc">
            Prijs (hoog -> laag)
        </label>
    </form>

    <form class="filter">
        <legend>Filteren</legend>
        <p>Makers</p>
        <label>
            <input id="brm" type="checkbox" name="maker-filter" value="BRM">
            BRM
        </label>
        <br>
        <label>
            <input id="scaleauto" type="checkbox" name="maker-filter" value="ScaleAuto">
            ScaleAuto
        </label>
        <br>
        <label>
            <input id="gecko" type="checkbox" name="maker-filter" value="Gecko">
            Gecko
        </label>
        <p>Klassen</p>
        <label>
            <input type="checkbox" name="class-filter" value="minicar">
            minicar
        </label>
        <br>
        <label>
            <input type="checkbox" name="class-filter" value="youngtimer">
            youngtimer
        </label>
        <br>
        <label>
            <input type="checkbox" name="class-filter" value="GT-pro">
            GT-pro
        </label>
        <p>Merk</p>
        <label>
            <input type="checkbox" name="brand-filter" value="porsche">
            Porsche
        </label>
        <br>
        <label>
            <input type="checkbox" name="brand-filter" value="mini">
            Mini
        </label>
        <br>
        <label>
            <input type="checkbox" name="brand-filter" value="viper">
            Viper
        </label>
        <p>Schaal</p>
        <label>
            <input type="checkbox" name="scale-filter" value="1:24">
            1:24
        </label>
        <br>
        <label>
            <input type="checkbox" name="scale-filter" value="1:32">
            1:32
        </label>
    </form>

    <main>
        <h1>Mijn Collectie</h1>
        <section class="items">
        </section>
        <ul class="statistics">
            <li class="collection-size">Collectie grootte:</li>
            <li class="collection-value">Collectie waarde:</li>
            <li class="average-price">Gemiddelde prijs:</li>
        </ul>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Slotcar Collection Tracker</p>
            <p>Built for collectors</p>
        </div>
    </footer>
</body>
</html>
